<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Co迪上线门禁：从报告到执行</title>
  <desc id="desc">展示本地证据、三杯报告、优化建议、用户确认、确认后执行的流程。</desc>
  <rect width="1600" height="900" fill="#fbf7ef"/>
  <text x="800" y="95" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="64" font-weight="800" fill="#0f172a">Co迪上线门禁</text>
  <text x="800" y="145" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#334155">从报告到执行</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#111827"/>
    </marker>
  </defs>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="60" y="230" width="300" height="430" rx="22" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <circle cx="105" cy="275" r="24" fill="#0f172a"/>
    <text x="105" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">1</text>
    <text x="210" y="288" text-anchor="middle" font-size="34" font-weight="800" fill="#0f172a">本地证据</text>
    <text x="120" y="370" font-size="24" fill="#334155">项目文件</text>
    <text x="120" y="435" font-size="24" fill="#334155">配置与代码</text>
    <text x="120" y="500" font-size="24" fill="#334155">工具清单</text>
    <text x="120" y="565" font-size="24" fill="#334155">日志与数据</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="450" y="230" width="330" height="430" rx="22" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <circle cx="495" cy="275" r="24" fill="#0f172a"/>
    <text x="495" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">2</text>
    <text x="615" y="288" text-anchor="middle" font-size="34" font-weight="800" fill="#0f172a">三杯报告</text>
    <rect x="490" y="350" width="250" height="54" rx="12" fill="#e8f5ea" stroke="#188038" stroke-width="3"/>
    <text x="615" y="386" text-anchor="middle" font-size="24" font-weight="700" fill="#14532d">中杯：快速摸底</text>
    <rect x="490" y="430" width="250" height="54" rx="12" fill="#fff7e6" stroke="#f59e0b" stroke-width="3"/>
    <text x="615" y="466" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">大杯：加固方案</text>
    <rect x="490" y="510" width="250" height="54" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <text x="615" y="546" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">超大杯：发布门禁</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="870" y="230" width="300" height="430" rx="22" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <circle cx="915" cy="275" r="24" fill="#0f172a"/>
    <text x="915" y="285" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">3</text>
    <text x="1020" y="288" text-anchor="middle" font-size="34" font-weight="800" fill="#0f172a">优化建议</text>
    <rect x="915" y="350" width="210" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1020" y="384" text-anchor="middle" font-size="22" fill="#334155">补齐证据</text>
    <rect x="915" y="425" width="210" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1020" y="459" text-anchor="middle" font-size="22" fill="#334155">收紧权限</text>
    <rect x="915" y="500" width="210" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1020" y="534" text-anchor="middle" font-size="22" fill="#334155">增加门禁</text>
    <rect x="915" y="575" width="210" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1020" y="609" text-anchor="middle" font-size="22" fill="#334155">继续指令</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <path d="M1250 445 l80 -80 l80 80 l-80 80z" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <text x="1330" y="438" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">用户</text>
    <text x="1330" y="475" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">确认</text>
    <rect x="1220" y="585" width="220" height="72" rx="16" fill="#fff7e6" stroke="#f59e0b" stroke-width="3"/>
    <text x="1330" y="630" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">未经确认不写入</text>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="1260" y="210" width="280" height="110" rx="20" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <text x="1400" y="255" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">确认后执行</text>
    <text x="1400" y="295" text-anchor="middle" font-size="22" fill="#334155">写入修复 · 更新证据</text>
  </g>

  <g stroke="#111827" stroke-width="5" marker-end="url(#arrow)">
    <line x1="360" y1="445" x2="430" y2="445"/>
    <line x1="780" y1="445" x2="850" y2="445"/>
    <line x1="1170" y1="445" x2="1235" y2="445"/>
    <line x1="1410" y1="445" x2="1440" y2="330"/>
  </g>
</svg>
