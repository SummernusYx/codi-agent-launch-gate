<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Co迪上线门禁</title>
  <desc id="desc">AI Agent 上线前的安全门禁，展示权限、工具、记忆、MCP、浏览器、证据和发布结论。</desc>
  <rect width="1600" height="900" fill="#fbf7ef"/>
  <rect x="40" y="40" width="1520" height="820" rx="28" fill="#fffdf8" stroke="#111827" stroke-width="4"/>
  <text x="800" y="105" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="70" font-weight="800" fill="#0f172a">Co迪上线门禁</text>
  <text x="800" y="158" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#334155">AI Agent 上线前，把权限、工具、记忆、外部内容和发布证据放到同一张检查表里</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    <rect x="110" y="230" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="240" y="295" text-anchor="middle">权限</text>
    <circle cx="145" cy="285" r="22" fill="#e8f5ea" stroke="#188038" stroke-width="4"/>
    <path d="M134 284 l8 9 l17 -22" fill="none" stroke="#188038" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="110" y="370" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="240" y="435" text-anchor="middle">工具</text>
    <path d="M134 440 l45 -45 M151 394 l30 30" stroke="#111827" stroke-width="8" stroke-linecap="round"/>

    <rect x="110" y="510" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="240" y="575" text-anchor="middle">记忆</text>
    <path d="M145 545 q-25 18 0 42 q35 20 70 0 q25 -24 0 -45 q-35 -22 -70 3z" fill="#ffffff" stroke="#111827" stroke-width="5"/>
    <path d="M178 530 v75 M150 562 h58" stroke="#188038" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g>
    <path d="M620 680 v-260 q0 -105 180 -105 t180 105 v260" fill="#f8fafc" stroke="#111827" stroke-width="6"/>
    <path d="M660 680 v-250 q0 -72 140 -72 t140 72 v250" fill="#fffdf8" stroke="#111827" stroke-width="4"/>
    <g stroke="#111827" stroke-width="5">
      <line x1="705" y1="392" x2="705" y2="680"/>
      <line x1="755" y1="365" x2="755" y2="680"/>
      <line x1="805" y1="360" x2="805" y2="680"/>
      <line x1="855" y1="365" x2="855" y2="680"/>
      <line x1="905" y1="392" x2="905" y2="680"/>
    </g>
    <rect x="700" y="210" width="200" height="82" rx="18" fill="#0f172a"/>
    <text x="800" y="264" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="800" fill="#ffffff">上线门禁</text>
    <rect x="690" y="715" width="220" height="74" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <circle cx="735" cy="752" r="14" fill="#188038"/>
    <circle cx="800" cy="752" r="14" fill="#f59e0b"/>
    <circle cx="865" cy="752" r="14" fill="#dc2626"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    <rect x="1230" y="230" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="1360" y="295" text-anchor="middle">MCP</text>
    <circle cx="1275" cy="285" r="18" fill="#188038"/>
    <line x1="1275" y1="255" x2="1275" y2="315" stroke="#111827" stroke-width="4"/>
    <line x1="1245" y1="285" x2="1305" y2="285" stroke="#111827" stroke-width="4"/>

    <rect x="1230" y="370" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="1360" y="435" text-anchor="middle">浏览器</text>
    <rect x="1250" y="395" width="70" height="56" rx="8" fill="#ffffff" stroke="#111827" stroke-width="5"/>
    <circle cx="1285" cy="423" r="18" fill="none" stroke="#188038" stroke-width="4"/>

    <rect x="1230" y="510" width="260" height="110" rx="16" fill="#ffffff" stroke="#111827" stroke-width="3"/>
    <text x="1360" y="575" text-anchor="middle">证据</text>
    <path d="M1265 535 h42 l24 24 v48 h-66z" fill="#ffffff" stroke="#111827" stroke-width="5"/>
    <path d="M1280 575 l14 14 l28 -36" fill="none" stroke="#188038" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="1055" y="680" width="330" height="110" rx="20" fill="#ffffff" stroke="#111827" stroke-width="4"/>
    <text x="1220" y="725" text-anchor="middle" font-size="32" font-weight="800" fill="#0f172a">发布结论</text>
    <circle cx="1110" cy="758" r="13" fill="#188038"/>
    <circle cx="1220" cy="758" r="13" fill="#f59e0b"/>
    <circle cx="1330" cy="758" r="13" fill="#dc2626"/>
    <text x="1110" y="805" text-anchor="middle" font-size="20" fill="#334155">放行</text>
    <text x="1220" y="805" text-anchor="middle" font-size="20" fill="#334155">带风险</text>
    <text x="1330" y="805" text-anchor="middle" font-size="20" fill="#334155">阻塞</text>
  </g>

  <g stroke="#111827" stroke-width="4" stroke-dasharray="9 10" fill="none">
    <path d="M370 285 C500 285 530 410 620 430"/>
    <path d="M370 425 C500 425 530 470 620 500"/>
    <path d="M370 565 C500 565 530 575 620 585"/>
    <path d="M980 430 C1080 410 1110 285 1230 285"/>
    <path d="M980 500 C1080 485 1110 425 1230 425"/>
    <path d="M980 585 C1080 585 1110 565 1230 565"/>
  </g>
</svg>
